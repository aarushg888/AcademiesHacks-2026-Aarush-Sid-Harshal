<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantClone — AI Investor Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
:root{--bg:#080808;--bg2:#111;--surface:rgba(255,255,255,0.04);--surface-h:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.1);--border-a:rgba(255,255,255,0.35);--text:#FFF;--muted:rgba(255,255,255,0.55);--dim:rgba(255,255,255,0.3)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
.reveal{opacity:0;transform:translateY(48px) scale(0.97);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1);will-change:opacity,transform}
.reveal.visible{opacity:1;transform:translateY(0) scale(1)}
.reveal-left{opacity:0;transform:translateX(-60px) rotateY(-12deg);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);transform-style:preserve-3d}
.reveal-left.visible{opacity:1;transform:translateX(0) rotateY(0deg)}
.reveal-right{opacity:0;transform:translateX(60px) rotateY(12deg);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);transform-style:preserve-3d}
.reveal-right.visible{opacity:1;transform:translateX(0) rotateY(0deg)}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:60px;background:rgba(8,8,8,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.5px}
.nav-logo span{color:rgba(255,255,255,0.35)}
.nav-pill{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:20px;background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--muted)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34D399;display:inline-block;margin-right:6px;animation:livepulse 2s infinite}
@keyframes livepulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,0.7)}50%{opacity:.6;box-shadow:0 0 0 6px rgba(52,211,153,0)}}
.hero{display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:center;max-width:1200px;margin:0 auto;padding:80px 48px 60px}
.hero-eye{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(38px,4.5vw,62px);font-weight:700;line-height:1.05;letter-spacing:-2px;margin-bottom:22px}
.hero-sub{font-size:15px;line-height:1.75;color:var(--muted);max-width:480px;margin-bottom:30px}
.hero-feats{display:flex;flex-direction:column;gap:11px}
.hero-feat{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.feat-dot{width:4px;height:4px;border-radius:50%;background:#fff;flex-shrink:0;opacity:.5}
.feat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;max-width:1200px;margin:0 auto;padding:0 48px 72px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;position:relative;overflow:hidden;transform-style:preserve-3d;transition:border-color .3s,box-shadow .3s}
.feat-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.06),transparent);opacity:0;transition:opacity .3s;border-radius:16px}
.feat-card:hover{border-color:rgba(255,255,255,0.25);box-shadow:0 24px 60px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.08)}
.feat-card:hover::after{opacity:1}
.feat-num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:300;color:rgba(255,255,255,.15);margin-bottom:12px}
.feat-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;color:#fff;margin-bottom:8px}
.feat-desc{font-size:12px;color:var(--dim);line-height:1.6}
.tabs-wrap{max-width:1200px;margin:0 auto;padding:0 48px 100px}
.tab-bar{display:flex;gap:3px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:5px;width:fit-content;margin-bottom:40px}
.tab-btn{font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:10px 22px;border:none;border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.tab-btn:hover{color:#fff;background:var(--surface-h)}
.tab-btn.active{background:#fff;color:#000;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.5);transform:translateY(-1px)}
.picker-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 32px;margin-bottom:4px;transition:border-color .3s,box-shadow .3s}
.picker-card:hover{border-color:var(--border-a);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.picker-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:18px}
.picker-eye{font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.picker-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;letter-spacing:-.5px;color:#fff;margin-bottom:6px}
.picker-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:480px}
.picker-num{font-family:'Space Grotesk',sans-serif;font-size:52px;font-weight:300;color:rgba(255,255,255,.06);line-height:1;flex-shrink:0}
.picker-div{height:1px;background:var(--border);margin:0 0 16px}
.picker-lbl{font-size:10px;font-weight:700;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{font-size:12px;font-weight:600;padding:7px 18px;background:transparent;border:1px solid rgba(255,255,255,.14);border-radius:20px;color:var(--muted);cursor:pointer;transition:all .2s}
.chip:hover,.chip.active{background:#fff;border-color:#fff;color:#000}
.slbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.slbl::before{content:'';width:12px;height:1px;background:rgba(255,255,255,.2)}
select,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;padding:12px 14px;transition:border-color .2s,box-shadow .2s;outline:none;appearance:none}
select:focus,textarea:focus{border-color:rgba(255,255,255,.4);box-shadow:0 0 0 3px rgba(255,255,255,.06)}
select option{background:#111}
textarea{resize:vertical;min-height:150px}
.btn{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;padding:12px 24px;border:none;border-radius:12px;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .2s}
.btn-primary{background:#fff;color:#000;box-shadow:0 4px 20px rgba(255,255,255,.12)}
.btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 40px rgba(255,255,255,.2)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{background:var(--surface-h);color:#fff;transform:translateY(-2px);border-color:rgba(255,255,255,.2)}
.btn-full{width:100%}
.stress-chip{font-size:11px;font-weight:500;padding:6px 12px;border-radius:7px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:rgba(252,165,165,.8);cursor:pointer;transition:all .15s}
.stress-chip:hover,.stress-chip.active{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#FCA5A5}
.verdict-wrap{border-radius:14px;overflow:hidden;margin-bottom:14px}
.verdict-top{display:flex;align-items:center;justify-content:space-between;padding:22px 26px}
.verdict-buy{background:linear-gradient(135deg,#063d2e,#065f46)}
.verdict-hold{background:linear-gradient(135deg,#3d2a06,#78350f)}
.verdict-sell{background:linear-gradient(135deg,#3d0606,#7f1d1d)}
.verdict-lbl{font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;letter-spacing:-1px}
.verdict-buy .verdict-lbl{color:#6EE7B7}.verdict-hold .verdict-lbl{color:#FCD34D}.verdict-sell .verdict-lbl{color:#FCA5A5}
.conviction-n{font-family:'Space Grotesk',sans-serif;font-size:50px;font-weight:700;letter-spacing:-2px;text-align:right}
.conviction-l{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);text-align:right}
@keyframes flipIn{from{opacity:0;transform:perspective(800px) rotateX(-35deg) translateY(20px)}to{opacity:1;transform:perspective(800px) rotateX(0) translateY(0)}}
.verdict-anim{animation:flipIn .7s cubic-bezier(.16,1,.3,1) both;transform-origin:top center}
.bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bd-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .2s;transform-style:preserve-3d}
.bd-cell:hover{transform:translateY(-4px) perspective(600px) rotateX(4deg);box-shadow:0 16px 40px rgba(0,0,0,.5);border-color:rgba(255,255,255,.2)}
.bd-dim{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.bd-rating{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;margin-bottom:7px}
.c-green{color:#34D399}.c-amber{color:#FBBF24}.c-red{color:#F87171}
.bar-track{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:7px}
.bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.f-green{background:#34D399}.f-amber{background:#FBBF24}.f-red{background:#F87171}
.bd-note{font-size:11px;color:var(--dim);line-height:1.5}
.reason-box{background:rgba(255,255,255,.04);border-left:2px solid rgba(255,255,255,.35);padding:14px 18px;border-radius:0 9px 9px 0;margin-bottom:10px}
.reason-text{font-size:13px;line-height:1.7;color:var(--muted)}
.insight-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:14px 18px;margin-bottom:10px}
.insight-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.insight-text{font-size:13px;line-height:1.6;color:var(--muted);font-style:italic}
.quote-box{border:1px solid rgba(255,255,255,.08);border-radius:9px;padding:14px 18px}
.quote-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.quote-text{font-size:12px;color:var(--dim);line-height:1.6;font-style:italic}
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.inv-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s,border-color .2s,background .2s;transform-style:preserve-3d}
.inv-card.active{border-color:rgba(255,255,255,.45);background:rgba(255,255,255,.09);transform:translateY(-4px) perspective(600px) rotateX(3deg);box-shadow:0 20px 50px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.15)}
.inv-card:hover:not(.active){transform:translateY(-4px) perspective(600px) rotateX(3deg);border-color:rgba(255,255,255,.25);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.inv-init{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:rgba(255,255,255,.3);margin-bottom:10px}
.inv-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px}
.inv-style{font-size:11px;color:var(--dim);line-height:1.4}
.score-banner{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:26px 30px;margin-bottom:18px;display:flex;align-items:center;gap:24px}
.score-big{font-family:'Space Grotesk',sans-serif;font-size:60px;font-weight:700;color:#fff;letter-spacing:-3px}
.score-meta{font-size:13px;color:var(--muted);line-height:1.8}
.summary-box{background:var(--surface);border-left:2px solid rgba(255,255,255,.3);padding:14px 18px;border-radius:0 9px 9px 0;margin-bottom:18px;font-size:13px;color:var(--muted);line-height:1.65;font-style:italic}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:10px;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .2s;transform-style:preserve-3d}
.match-card:hover{transform:translateY(-4px) perspective(600px) rotateX(3deg);box-shadow:0 16px 40px rgba(0,0,0,.4);border-color:rgba(255,255,255,.2)}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-name{font-size:14px;font-weight:600;color:#fff}
.match-pct{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700}
.match-feedback{font-size:12px;color:var(--muted);line-height:1.55}
.principle-row{padding:15px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.principle-row:last-child{border-bottom:none}
.p-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.p-name{font-size:13px;font-weight:600;color:#fff}
.p-weight{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:rgba(255,255,255,.4)}
.p-desc{font-size:12px;color:var(--dim);line-height:1.55;margin-bottom:7px}
.p-bar-track{height:2px;background:rgba(255,255,255,.07);border-radius:1px}
.p-bar-fill{height:100%;background:rgba(255,255,255,.4);border-radius:1px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.flag-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);align-items:flex-start}
.flag-row:last-child{border-bottom:none}
.flag-dot{width:6px;height:6px;background:#EF4444;border-radius:50%;margin-top:5px;flex-shrink:0}
.flag-text{font-size:12px;color:var(--muted);line-height:1.55}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s,border-color .2s;transform-style:preserve-3d}
.card:hover{transform:translateY(-3px) perspective(600px) rotateX(2deg);box-shadow:0 20px 50px rgba(0,0,0,.4);border-color:rgba(255,255,255,.18)}
.two-col{display:grid;grid-template-columns:1fr 1.1fr;gap:32px;align-items:start}
.two-equal{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
.two-sel{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.stress-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:14px}
.loading-dots{display:flex;gap:8px}
.loading-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.6);animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
.loading-text{font-size:13px;color:var(--dim);font-style:italic}
.radio-group{display:flex;gap:8px}
.radio-opt{font-size:13px;font-weight:600;padding:8px 22px;border:1px solid var(--border);border-radius:9px;cursor:pointer;color:var(--muted);transition:all .25s cubic-bezier(.34,1.56,.64,1);background:transparent}
.radio-opt:hover{border-color:rgba(255,255,255,.25);color:#fff;transform:translateY(-2px)}
.radio-opt.sel-buy{border-color:#10B981;color:#10B981;background:rgba(16,185,129,.1);transform:translateY(-2px)}
.radio-opt.sel-hold{border-color:#F59E0B;color:#F59E0B;background:rgba(245,158,11,.1);transform:translateY(-2px)}
.radio-opt.sel-sell{border-color:#EF4444;color:#EF4444;background:rgba(239,68,68,.1);transform:translateY(-2px)}
.range-wrap{display:flex;align-items:center;gap:12px}
.range-val{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#fff;min-width:42px;text-align:right}
input[type=range]{width:100%;accent-color:#fff}
.active-stress{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:12px;color:rgba(252,165,165,.85)}
.disagree-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:11px;padding:18px 22px;margin-top:24px}
.inv-heading{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.section-divider{max-width:1200px;margin:0 auto;padding:0 48px;margin-bottom:72px}
.divider-line{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6}

/* === LIVE DATA STRIP === */
.live-strip{display:flex;align-items:center;gap:18px;padding:14px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;margin-bottom:14px;flex-wrap:wrap}
.live-tick{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.live-price{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:#fff;letter-spacing:-1px}
.live-change{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:3px 9px;border-radius:5px}
.live-change.up{background:rgba(52,211,153,0.15);color:#34D399}
.live-change.down{background:rgba(248,113,113,0.15);color:#F87171}
.live-meta{font-size:11px;color:var(--dim);display:flex;flex-direction:column;gap:2px}
.live-meta strong{color:rgba(255,255,255,0.7);font-weight:600}

/* === MONOCHROME PORTFOLIO === */
.mono-banner{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px 32px;margin-bottom:20px;display:flex;align-items:center;gap:28px}
.mono-score{font-family:'Space Grotesk',sans-serif;font-size:72px;font-weight:700;color:#fff;letter-spacing:-4px;line-height:1}
.mono-pos-row{display:grid;grid-template-columns:80px 1fr 120px 100px 32px;gap:12px;align-items:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 16px}
.mono-verdict{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:6px;padding:4px 10px;text-align:center;font-size:11px;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;letter-spacing:0.5px}
.mono-verdict.buy{background:rgba(255,255,255,0.92);color:#000}
.mono-verdict.sell{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);border-color:rgba(255,255,255,0.08)}
.mono-pill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.7)}
.mono-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px 22px}
.mono-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.mono-bar-fill{height:100%;background:rgba(255,255,255,0.85);border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

/* ── SCROLL REVEAL ── */
function useScrollReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const d = parseFloat(e.target.dataset.delay || 0);
          setTimeout(() => e.target.classList.add('visible'), d * 1000);
          obs.unobserve(e.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });
    document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

/* ── 3D TILT ── */
function useTilt(depth = 2) {
  const ref = useRef(null);
  const deg = depth === 1 ? 6 : depth === 2 ? 14 : 22;
  const onMouseMove = useCallback((e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(900px) rotateY(${x * deg}deg) rotateX(${-y * deg}deg) translateZ(${depth * 4}px)`;
    el.style.transition = 'transform 0.1s ease-out';
  }, [deg, depth]);
  const onMouseLeave = useCallback(() => {
    if (ref.current) {
      ref.current.style.transition = 'transform 0.6s cubic-bezier(0.34,1.56,0.64,1)';
      ref.current.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg) translateZ(0px)';
    }
  }, []);
  return { ref, onMouseMove, onMouseLeave };
}

/* ── DATA ── */
const INVESTORS = {
  buffett:{ name:"Warren Buffett", initials:"WB", style:"Value · Moats · Patience", profile:"Seeks businesses with durable competitive advantages trading below intrinsic value." },
  munger: { name:"Charlie Munger", initials:"CM", style:"Mental Models · Inversion · Quality", profile:"Applies multidisciplinary mental models to investing. Inverts problems, focuses on avoiding stupidity over seeking brilliance." },
  dalio:  { name:"Ray Dalio", initials:"RD", style:"Macro · Cycles · Risk Parity", profile:"Understands debt cycles and macro environments. Seeks balance and diversification." },
  lynch:  { name:"Peter Lynch", initials:"PL", style:"Growth · PEG · Consumer Edge", profile:"Finds growth at a reasonable price (GARP). Famous for PEG ratio analysis." },
};

const STOCKS = {
  NVDA:{ label:"Nvidia", text:"Nvidia (NVDA) is the dominant AI chip maker. Main risk: customer concentration and rising competition from AMD and custom silicon." },
  AAPL:{ label:"Apple",  text:"Apple (AAPL) consumer hardware and services giant. Risk: China exposure (18% of revenue) and slowing upgrade cycles." },
  TSLA:{ label:"Tesla",  text:"Tesla (TSLA) EV and energy company. Elon Musk distraction risk. Strong brand but increasing competition from BYD, GM, and others." },
  MSFT:{ label:"Microsoft", text:"Microsoft (MSFT) enterprise software and cloud leader. Copilot AI integration across Office 365. Risk: antitrust scrutiny and OpenAI dependency." },
  AMZN:{ label:"Amazon", text:"Amazon (AMZN) cloud, retail, and advertising giant. AWS is #1 cloud provider. Risk: regulatory pressure and slowing AWS growth." },
};

const STRESS_OPTS = {
  "Rates +2%":"Interest rates rise by 200 basis points due to persistent inflation.",
  "Market −30%":"Broad market crash of 30% due to recession fears.",
  "Earnings Miss":"Company misses earnings by 20% and lowers full-year guidance.",
  "Sector Boom":"The sector experiences a major tailwind and 40% sector-wide rally.",
};

function detectTicker(text) {
  if (!text) return null;
  const m = text.match(/\(([A-Z]{1,5})\)/);
  if (m) return m[1];
  for (const t of Object.keys(STOCKS)) { if (text.includes(t)) return t; }
  return null;
}

/* ── LIVE DATA HOOK ── */
function useLiveData(ticker) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!ticker) { setData(null); return; }
    setLoading(true);
    fetch(`/api/market/${ticker}`)
      .then(r => r.ok ? r.json() : null)
      .then(d => { setData(d); setLoading(false); })
      .catch(() => { setData(null); setLoading(false); });
  }, [ticker]);
  return { data, loading };
}

/* ── LIVE DATA STRIP (real prices, real sparkline) ── */
function LiveDataStrip({ ticker, fallbackResult }) {
  const { data: live } = useLiveData(ticker);
  const data = live || fallbackResult?.live_data;
  if (!data) return null;
  const sl = data.sparkline || [];
  const W=180, H=40;
  let path = "", area = "";
  if (sl.length > 1) {
    const mn = Math.min(...sl), mx = Math.max(...sl), rng = mx - mn || 1;
    const pts = sl.map((v,i) => ({ x: (i/(sl.length-1))*W, y: H - ((v-mn)/rng)*H }));
    path = pts.map((p,i) => i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
    area = path + ` L${W},${H} L0,${H} Z`;
  }
  const up = (data.change_pct || 0) >= 0;
  const lc = up ? "#34D399" : "#F87171";
  return (
    <div className="live-strip">
      <span className="live-dot"></span>
      <div className="live-tick">{data.ticker}</div>
      <div className="live-price">${data.price?.toFixed(2)}</div>
      {data.change_pct !== undefined && (
        <div className={`live-change ${up?'up':'down'}`}>{up?'+':''}{data.change_pct?.toFixed(2)}%</div>
      )}
      {sl.length > 1 && (
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'180px',height:'40px',flexShrink:0}}>
          <defs><linearGradient id={`grd-${data.ticker}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity="0.3"/><stop offset="100%" stopColor={lc} stopOpacity="0"/></linearGradient></defs>
          <path d={area} fill={`url(#grd-${data.ticker})`}/>
          <path d={path} fill="none" stroke={lc} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      <div style={{display:'flex',gap:14,marginLeft:'auto',flexWrap:'wrap'}}>
        {data.market_cap_fmt && <div className="live-meta"><span>Market Cap</span><strong>{data.market_cap_fmt}</strong></div>}
        {data.pe_ratio && <div className="live-meta"><span>P/E</span><strong>{Number(data.pe_ratio).toFixed(1)}</strong></div>}
        {data.sector && <div className="live-meta"><span>Sector</span><strong>{data.sector}</strong></div>}
      </div>
    </div>
  );
}

/* ── RADAR CHART (4-axis verdict visualization) ── */
function RadarChart({ result, label }) {
  if (!result?.breakdown) return null;
  const dims = ["valuation","growth","risk","conditions"];
  const labels = ["Valuation","Growth","Risk","Conditions"];
  const scores = dims.map(d => result.breakdown[d]?.score || 50);
  const cx=160, cy=160, R=110;
  const angle = (i) => (Math.PI*2 * i / 4) - Math.PI/2;
  const pt = (i, r) => ({ x: cx + Math.cos(angle(i))*r, y: cy + Math.sin(angle(i))*r });
  const dataPoints = scores.map((s,i) => pt(i, R * (s/100)));
  const dataPath = dataPoints.map((p,i) => `${i===0?'M':'L'}${p.x},${p.y}`).join(' ') + ' Z';
  const v = result.verdict;
  const lc = v==='BUY' ? '#34D399' : v==='SELL' ? '#F87171' : '#FBBF24';
  return (
    <div className="card" style={{marginBottom:14,padding:'20px 24px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)'}}>Decision Radar {label && `· ${label}`}</div>
        <div style={{fontSize:'11px',color:lc,fontWeight:600}}>{v} · {result.conviction}</div>
      </div>
      <svg viewBox="0 0 320 320" style={{width:'100%',maxHeight:'320px'}}>
        {/* concentric grid */}
        {[0.25,0.5,0.75,1].map(f => (
          <polygon key={f} points={[0,1,2,3].map(i => { const p = pt(i, R*f); return `${p.x},${p.y}`; }).join(' ')}
                   fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
        ))}
        {/* axes */}
        {[0,1,2,3].map(i => { const p = pt(i, R); return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>; })}
        {/* data polygon */}
        <path d={dataPath} fill={lc} fillOpacity="0.18" stroke={lc} strokeWidth="2" strokeLinejoin="round"/>
        {dataPoints.map((p,i) => <circle key={i} cx={p.x} cy={p.y} r="4" fill={lc}/>)}
        {/* labels */}
        {labels.map((l,i) => {
          const p = pt(i, R + 24);
          const score = scores[i];
          return (
            <g key={l}>
              <text x={p.x} y={p.y} textAnchor="middle" fontSize="11" fill="rgba(255,255,255,0.55)" fontFamily="Inter,sans-serif" fontWeight="600">{l}</text>
              <text x={p.x} y={p.y+13} textAnchor="middle" fontSize="10" fill="rgba(255,255,255,0.3)" fontFamily="Space Grotesk,sans-serif">{score}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ── CONVICTION GAUGE (semicircle dial) ── */
function ConvictionGauge({ value, verdict }) {
  const pct = Math.max(0, Math.min(100, value || 50));
  const angle = -Math.PI + (Math.PI * pct/100);
  const cx=110, cy=110, r=84;
  const ax = cx + Math.cos(-Math.PI)*r, ay = cy + Math.sin(-Math.PI)*r;
  const bx = cx + Math.cos(0)*r, by = cy + Math.sin(0)*r;
  const ex = cx + Math.cos(angle)*r, ey = cy + Math.sin(angle)*r;
  const lc = verdict==='BUY' ? '#34D399' : verdict==='SELL' ? '#F87171' : '#FBBF24';
  return (
    <svg viewBox="0 0 220 130" style={{width:'180px',height:'auto'}}>
      <path d={`M${ax},${ay} A${r},${r} 0 0,1 ${bx},${by}`} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="10" strokeLinecap="round"/>
      <path d={`M${ax},${ay} A${r},${r} 0 0,1 ${ex},${ey}`} fill="none" stroke={lc} strokeWidth="10" strokeLinecap="round"/>
      <text x={cx} y={cy-8} textAnchor="middle" fontSize="32" fontWeight="700" fill="#fff" fontFamily="Space Grotesk,sans-serif">{pct}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.45)" fontFamily="Inter,sans-serif" fontWeight="600" letterSpacing="2">CONVICTION</text>
    </svg>
  );
}

/* ── COMPARISON CHART (side-by-side bars) ── */
function ComparisonChart({ resA, resB, nameA, nameB }) {
  const dims=[['valuation','Valuation'],['growth','Growth'],['risk','Risk'],['conditions','Conditions']];
  const W=580, H=210, pL=28, pR=20, pT=44, pB=36, cw=W-pL-pR, ch=H-pT-pB, gw=cw/dims.length, bw=gw*0.28;
  return (
    <div className="reveal" data-delay="0.05" style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'14px',padding:'20px 24px',marginTop:'24px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}>
        <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.28)'}}>Dimension Comparison</div>
        <div style={{display:'flex',gap:'16px',alignItems:'center'}}>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}><div style={{width:'10px',height:'10px',borderRadius:'2px',background:'rgba(255,255,255,0.7)'}}></div><span style={{fontSize:'11px',color:'rgba(255,255,255,0.45)'}}>{nameA}</span></div>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}><div style={{width:'10px',height:'10px',borderRadius:'2px',background:'rgba(255,255,255,0.25)'}}></div><span style={{fontSize:'11px',color:'rgba(255,255,255,0.3)'}}>{nameB}</span></div>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        {[0,25,50,75,100].map(v=>{ const y=pT+ch-(v/100)*ch; return <g key={v}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>{v%50===0&&<text x={pL-4} y={y+3} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.2)" fontFamily="Inter,sans-serif">{v}</text>}</g>; })}
        {dims.map(([key,label],i)=>{ const sA=resA?.breakdown?.[key]?.score||50; const sB=resB?.breakdown?.[key]?.score||50; const cx=pL+i*gw+gw/2; const ax=cx-bw-3; const bx=cx+3; const ah=(sA/100)*ch; const bh=(sB/100)*ch; const ca=sA>=65?'#34D399':sA>=35?'#FBBF24':'#F87171'; const cb=sB>=65?'#34D399':sB>=35?'#FBBF24':'#F87171';
          return <g key={key}>
            <rect x={ax} y={pT+ch-ah} width={bw} height={ah} fill={ca} opacity="0.8" rx="3"/>
            <text x={ax+bw/2} y={pT+ch-ah-5} textAnchor="middle" fontSize="9" fill={ca} fontFamily="Space Grotesk,sans-serif" fontWeight="700">{sA}</text>
            <rect x={bx} y={pT+ch-bh} width={bw} height={bh} fill={cb} opacity="0.35" rx="3"/>
            <text x={bx+bw/2} y={pT+ch-bh-5} textAnchor="middle" fontSize="9" fill={cb} opacity="0.7" fontFamily="Space Grotesk,sans-serif" fontWeight="700">{sB}</text>
            <text x={cx} y={H-pB+16} textAnchor="middle" fontSize="10" fill="rgba(255,255,255,0.28)" fontFamily="Inter,sans-serif">{label}</text>
          </g>;
        })}
        <line x1={pL} y1={pT} x2={pL} y2={pT+ch} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>
        <line x1={pL} y1={pT+ch} x2={W-pR} y2={pT+ch} stroke="rgba(255,255,255,0.07)" strokeWidth="1"/>
      </svg>
    </div>
  );
}

/* ── PORTFOLIO COMPOSITION DONUT (monochrome) ── */
function PortfolioDonut({ holdings, positions }) {
  if (!holdings || holdings.length === 0) return null;
  const total = holdings.reduce((s,h) => s + h.weight_pct, 0);
  const cx=120, cy=120, rOuter=100, rInner=68;
  let acc = 0;
  // Grayscale palette — varies opacity to differentiate positions
  const grayShade = (i) => {
    const shades = [0.95, 0.78, 0.62, 0.48, 0.36, 0.27, 0.20, 0.14];
    return `rgba(255,255,255,${shades[i % shades.length]})`;
  };
  const slices = holdings.map((h, i) => {
    const frac = h.weight_pct / total;
    const a0 = (acc / total) * Math.PI * 2 - Math.PI/2;
    acc += h.weight_pct;
    const a1 = (acc / total) * Math.PI * 2 - Math.PI/2;
    const x0 = cx + Math.cos(a0)*rOuter, y0 = cy + Math.sin(a0)*rOuter;
    const x1 = cx + Math.cos(a1)*rOuter, y1 = cy + Math.sin(a1)*rOuter;
    const x2 = cx + Math.cos(a1)*rInner, y2 = cy + Math.sin(a1)*rInner;
    const x3 = cx + Math.cos(a0)*rInner, y3 = cy + Math.sin(a0)*rInner;
    const large = frac > 0.5 ? 1 : 0;
    const d = `M${x0},${y0} A${rOuter},${rOuter} 0 ${large},1 ${x1},${y1} L${x2},${y2} A${rInner},${rInner} 0 ${large},0 ${x3},${y3} Z`;
    // Label position
    const am = (a0 + a1) / 2;
    const lx = cx + Math.cos(am) * (rOuter + 16);
    const ly = cy + Math.sin(am) * (rOuter + 16);
    return { d, ticker: h.ticker, weight: h.weight_pct, color: grayShade(i), lx, ly };
  });
  return (
    <div className="mono-card">
      <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:14}}>Allocation</div>
      <svg viewBox="0 0 280 280" style={{width:'100%',height:'auto',maxHeight:'280px'}}>
        {slices.map((s,i) => (
          <g key={i}>
            <path d={s.d} fill={s.color} stroke="#080808" strokeWidth="2"/>
            <text x={s.lx} y={s.ly} textAnchor="middle" fontSize="10" fill="rgba(255,255,255,0.65)" fontFamily="Space Grotesk,sans-serif" fontWeight="700">{s.ticker}</text>
            <text x={s.lx} y={s.ly+12} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.35)" fontFamily="Inter,sans-serif">{s.weight}%</text>
          </g>
        ))}
        <text x={cx} y={cy-4} textAnchor="middle" fontSize="11" fill="rgba(255,255,255,0.35)" fontFamily="Inter,sans-serif" fontWeight="600" letterSpacing="2">TOTAL</text>
        <text x={cx} y={cy+18} textAnchor="middle" fontSize="22" fill="#fff" fontFamily="Space Grotesk,sans-serif" fontWeight="700">{total}%</text>
      </svg>
    </div>
  );
}

/* ── PORTFOLIO CONVICTION SCATTER (monochrome) ── */
function ConvictionScatter({ positions, holdings }) {
  if (!positions || positions.length === 0) return null;
  const W=440, H=240, pL=42, pR=20, pT=22, pB=42;
  const cw = W-pL-pR, ch = H-pT-pB;
  return (
    <div className="mono-card">
      <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:14}}>Conviction × Weight</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto'}}>
        {/* axes */}
        <line x1={pL} y1={pT} x2={pL} y2={pT+ch} stroke="rgba(255,255,255,0.1)"/>
        <line x1={pL} y1={pT+ch} x2={W-pR} y2={pT+ch} stroke="rgba(255,255,255,0.1)"/>
        {/* gridlines */}
        {[25,50,75].map(v => {
          const y = pT + ch - (v/100)*ch;
          return <g key={v}><line x1={pL} y1={y} x2={W-pR} y2={y} stroke="rgba(255,255,255,0.04)" strokeDasharray="2,3"/><text x={pL-6} y={y+3} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.3)">{v}</text></g>;
        })}
        {[20,40,60].map(v => {
          const x = pL + (v/80)*cw;
          return <g key={v}><line x1={x} y1={pT} x2={x} y2={pT+ch} stroke="rgba(255,255,255,0.04)" strokeDasharray="2,3"/><text x={x} y={pT+ch+14} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.3)">{v}%</text></g>;
        })}
        <text x={pL-6} y={pT+8} textAnchor="end" fontSize="9" fill="rgba(255,255,255,0.4)" fontWeight="700">CONV</text>
        <text x={(W-pL-pR)/2 + pL} y={H-6} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.4)" fontWeight="700" letterSpacing="1.5">WEIGHT %</text>
        {/* points */}
        {positions.map((p, i) => {
          const h = holdings.find(hh => hh.ticker.toUpperCase() === p.ticker.toUpperCase());
          if (!h) return null;
          const x = pL + (Math.min(h.weight_pct, 80)/80) * cw;
          const y = pT + ch - (p.conviction/100) * ch;
          const radius = 4 + (h.weight_pct/80)*8;
          const opacity = p.verdict === 'BUY' ? 0.95 : p.verdict === 'SELL' ? 0.3 : 0.6;
          return (
            <g key={i}>
              <circle cx={x} cy={y} r={radius} fill="#fff" opacity={opacity}/>
              <circle cx={x} cy={y} r={radius+3} fill="none" stroke="#fff" strokeOpacity="0.2"/>
              <text x={x} y={y-radius-4} textAnchor="middle" fontSize="10" fill="#fff" fontFamily="Space Grotesk,sans-serif" fontWeight="700">{p.ticker}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* ── PRINCIPLE BAR CHART (DNA Lab) ── */


/* ── SHARED ── */
function Loading({ text }) {
  return (
    <div className="loading">
      <div className="loading-dots"><div className="loading-dot"></div><div className="loading-dot"></div><div className="loading-dot"></div></div>
      <div className="loading-text">{text || "Analyzing…"}</div>
    </div>
  );
}

function ratingColor(r) {
  const pos=new Set(["Buy","BUY","Cheap","Strong","Low","Favorable","Fair"]);
  const neg=new Set(["Sell","SELL","Expensive","Weak","High","Unfavorable"]);
  return pos.has(r)?"c-green":neg.has(r)?"c-red":"c-amber";
}
function barColor(s) { return s>=65?"f-green":s>=35?"f-amber":"f-red"; }

function VerdictCard({ result }) {
  const {verdict,conviction,breakdown,reasoning,key_insight,key_quote}=result;
  const vc=verdict==="BUY"?"verdict-buy":verdict==="SELL"?"verdict-sell":"verdict-hold";
  const dims=[["valuation","Valuation"],["growth","Growth"],["risk","Risk"],["conditions","Conditions"]];
  return (
    <div className="verdict-anim">
      <div className="verdict-wrap">
        <div className={`verdict-top ${vc}`}>
          <div><div className="verdict-lbl">{verdict}</div><div style={{fontSize:'10px',fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginTop:'4px'}}>Verdict</div></div>
          <ConvictionGauge value={conviction} verdict={verdict} />
        </div>
      </div>
      <div className="bd-grid">
        {dims.map(([k,l])=>{ const c=breakdown?.[k]||{}; return (
          <div className="bd-cell" key={k}>
            <div className="bd-dim">{l}</div>
            <div className={`bd-rating ${ratingColor(c.rating)}`}>{c.rating||"—"}</div>
            <div className="bar-track"><div className={`bar-fill ${barColor(c.score||50)}`} style={{width:(c.score||50)+'%'}}></div></div>
            <div className="bd-note">{c.note}</div>
          </div>
        );})}
      </div>
      <div className="reason-box"><div className="reason-text">{reasoning}</div></div>
      {key_insight&&<div className="insight-box"><div className="insight-lbl">Key Insight</div><div className="insight-text">{key_insight}</div></div>}
      {key_quote&&<div className="quote-box"><div className="quote-lbl">Driving Principle</div><div className="quote-text">"{key_quote}"</div></div>}
    </div>
  );
}

function FeatCard({num,title,desc,delay,tiltDepth}) {
  const t=useTilt(tiltDepth);
  return (

/* ── TAB 5: PORTFOLIO MODE (MONOCHROME) ── */
function PortfolioMode() {
  const STOCK_OPTS = {
    NVDA:"Nvidia (NVDA) — AI chip leader.",
    AAPL:"Apple (AAPL) — Consumer hardware + services.",
    TSLA:"Tesla (TSLA) — EV + energy.",
    MSFT:"Microsoft (MSFT) — Enterprise software + cloud.",
    AMZN:"Amazon (AMZN) — Cloud + retail + ads.",
    GOOG:"Alphabet (GOOG) — Search + cloud + AI.",
    META:"Meta (META) — Social media + AI.",
    "BRK-B":"Berkshire Hathaway (BRK-B) — Diversified conglomerate.",
  };

  const [holdings, setHoldings] = useState([
    { ticker:"AAPL", description: STOCK_OPTS["AAPL"], weight_pct: 30 },
    { ticker:"MSFT", description: STOCK_OPTS["MSFT"], weight_pct: 25 },
    { ticker:"NVDA", description: STOCK_OPTS["NVDA"], weight_pct: 25 },
    { ticker:"AMZN", description: STOCK_OPTS["AMZN"], weight_pct: 20 },
  ]);
  const [focusInvestor, setFocusInvestor] = useState("buffett");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const totalWeight = holdings.reduce((s, h) => s + h.weight_pct, 0);

  const addHolding = (ticker) => {
    if (holdings.find(h => h.ticker === ticker)) return;
    if (holdings.length >= 8) return;
    const remaining = Math.max(0, 100 - totalWeight);
    setHoldings(prev => [...prev, { ticker, description: STOCK_OPTS[ticker], weight_pct: Math.min(remaining, 15) }]);
  };
  const removeHolding = (idx) => setHoldings(prev => prev.filter((_, i) => i !== idx));
  const updateWeight = (idx, val) => setHoldings(prev => prev.map((h, i) => i === idx ? {...h, weight_pct: Math.max(1, Math.min(99, parseInt(val)))} : h));
  const [customScenario, setCustomScenario] = useState("");

  const analyze = async () => {
    if (holdings.length < 2) return;
    setLoading(true); setResult(null);
    try {
      const r = await fetch('/api/portfolio', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ holdings, focus_investor: focusInvestor })
      });
      const data = await r.json();
      if (data.error) { alert('Error: ' + data.error); setLoading(false); return; }
      setResult(data);
    } catch(e) { alert('Network error: ' + e.message); }
    setLoading(false);
  };

  const verdictClass = (v) => v === 'BUY' ? 'buy' : v === 'SELL' ? 'sell' : '';

  return (
    <div>
      <div style={{fontSize:'14px',color:'var(--muted)',maxWidth:'600px',marginBottom:'28px',lineHeight:1.7}}>
        Build your portfolio — live fundamentals load automatically — then see it rated through one investor's lens.

      <div className="picker-card" style={{marginBottom:'24px'}}>
        <div className="picker-head">
          <div><div className="picker-eye">Step 1</div><div className="picker-title">Choose your investor lens</div><div className="picker-sub">Which investor's framework should rate your portfolio?</div></div>
          <div className="picker-num">01</div>
        </div>
        <div className="picker-div"></div>
        <div style={{display:'flex',gap:24,marginBottom:20,padding:'12px 16px',background:'rgba(255,255,255,0.03)',borderRadius:10,border:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
          <div style={{width:4,height:4,borderRadius:'50%',background:'rgba(255,255,255,0.4)',marginTop:5,flexShrink:0}}/>
          <div>
            <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.5)',marginBottom:3}}>Total Weight</div>
            <div style={{fontSize:'12px',color:'var(--muted)',lineHeight:1.5}}>All positions should add up to <strong style={{color:'#fff'}}>100%</strong> of your portfolio. The counter top-right updates as you adjust.</div>
          </div>
        </div>
        <div style={{width:1,background:'rgba(255,255,255,0.06)',flexShrink:0}}/>
        <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
          <div style={{width:4,height:4,borderRadius:'50%',background:'rgba(255,255,255,0.4)',marginTop:5,flexShrink:0}}/>
          <div>
            <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(255,255,255,0.5)',marginBottom:3}}>Slider</div>
            <div style={{fontSize:'12px',color:'var(--muted)',lineHeight:1.5}}>Drag to set what <strong style={{color:'#fff'}}>% of your portfolio</strong> is allocated to each position. Max 80% per position.</div>
          </div>
        </div>
      </div>
        <div className="inv-grid" style={{marginBottom:'8px'}}>
          {Object.entries(INVESTORS).map(([k,v]) => (
            <div key={k} className={`inv-card ${focusInvestor===k?'active':''}`} onClick={()=>{setFocusInvestor(k);setResult(null);}}>
              <div className="inv-init">{v.initials}</div>
              <div className="inv-name">{v.name}</div>
              <div className="inv-style">{v.style}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="picker-card" style={{marginBottom:'24px'}}>
        <div className="picker-head">
          <div><div className="picker-eye">Step 2</div><div className="picker-title">Build your portfolio</div><div className="picker-sub">Add up to 8 positions and set your allocation.</div></div>
          <div className="picker-num" style={{color: Math.abs(totalWeight-100)<1 ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)'}}>{totalWeight}%</div>
        </div>
        <div className="picker-div"></div>
        <div className="slbl" style={{marginBottom:'12px'}}>Quick add</div>
        <div className="chips" style={{marginBottom:'16px'}}>
          {Object.keys(STOCK_OPTS).map(t => (
            <button key={t} className={`chip ${holdings.find(h=>h.ticker===t)?'active':''}`}
                    onClick={()=> holdings.find(h=>h.ticker===t) ? removeHolding(holdings.findIndex(h=>h.ticker===t)) : addHolding(t)}>
              {t}
            </button>
          ))}
        </div>
        <div className="slbl">Or describe your own stock</div>
        <textarea
          value={customScenario}
          onChange={e=>setCustomScenario(e.target.value)}
          placeholder="e.g. NVDA — AI chip maker, P/E 60x, revenue +122% YoY…"
          style={{marginBottom:12,minHeight:80}}
        />
        <button className="btn btn-ghost" style={{marginBottom:20,width:'auto',padding:'8px 18px'}}
          onClick={()=>{
            const text = customScenario.trim();
            if(!text) return;
            const words = text.toUpperCase().split(/[\s,\-—]+/);
            const blocklist = new Set(["AI","P","E","YOY","USD","EPS","THE","AND","OR","FOR","WITH"]);
            const ticker = words.find(w => w.length >= 2 && w.length <= 5 && /^[A-Z]+$/.test(w) && !blocklist.has(w));
            if(!ticker){ alert("Start with the ticker e.g. NVDA — ..."); return; }
            if(holdings.find(h => h.ticker === ticker)){ alert(`${ticker} already in portfolio`); return; }
            if(holdings.length >= 8){ alert("Max 8 holdings"); return; }
            setHoldings(prev => [...prev, {ticker, description: text, weight_pct: 10}]);
            setCustomScenario("");
          }}>Add to Portfolio +</button>
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {holdings.map((h, idx) => {
            const live = result?.live_snapshots?.[h.ticker.toUpperCase()];
            const pos = result?.positions?.find(p => p.ticker.toUpperCase() === h.ticker.toUpperCase());
            return (
              <div key={idx} className="mono-pos-row">
                <div style={{display:'flex',flexDirection:'column',gap:2}}>
                  <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'15px',fontWeight:700,color:'#fff'}}>{h.ticker}</div>
                  {live?.price && <div style={{fontSize:'10px',color:'rgba(255,255,255,0.45)'}}>${live.price}</div>}
                </div>
                <div style={{fontSize:'12px',color:'var(--muted)',lineHeight:1.4}}>
                  {h.description.split('—')[1]?.trim().slice(0,60) || h.description.slice(0,60)}
                  {live?.market_cap_fmt && <span className="mono-pill" style={{marginLeft:8}}>{live.market_cap_fmt}</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  <input type="range" min={1} max={80} value={h.weight_pct} onChange={e=>updateWeight(idx,e.target.value)} style={{width:'70px'}}/>
                  <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'14px',fontWeight:700,color:'#fff',minWidth:'35px'}}>{h.weight_pct}%</span>
                </div>
                {pos ? <div className={`mono-verdict ${verdictClass(pos.verdict)}`}>{pos.verdict} {pos.conviction}</div> : <div/>}
                <button onClick={()=>removeHolding(idx)} style={{background:'transparent',border:'none',color:'rgba(255,255,255,0.25)',cursor:'pointer',fontSize:'16px',padding:0}}>×</button>
              </div>
            );
          })}
        </div>
      </div>

      <button className="btn btn-primary" onClick={analyze} style={{marginBottom:'32px'}}>
        Analyze Portfolio Through {INVESTORS[focusInvestor].name.split(' ')[1]}'s Eyes →
      </button>

      {loading && <Loading text={`${INVESTORS[focusInvestor].name} is reviewing your portfolio…`} />}

      {result && !loading && (
        <div>
          <div className="mono-banner">
            <div className="mono-score">{result.overall_score}</div>
            <div>
              <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'22px',fontWeight:600,color:'#fff',marginBottom:'6px',letterSpacing:'-0.5px'}}>{result.overall_verdict} Portfolio</div>
              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.65,maxWidth:'520px',fontStyle:'italic'}}>{result.portfolio_summary}</div>
            </div>
          </div>
          <div className="two-equal" style={{marginBottom:20}}>
            <PortfolioDonut holdings={holdings} positions={result.positions} />
            <ConvictionScatter positions={result.positions} holdings={holdings} />
          </div>
          <div className="two-equal" style={{marginBottom:'20px'}}>
            <div className="mono-card">
              <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.7)',marginBottom:'12px'}}>Strengths</div>
              {result.strengths.map((s,i)=>(
                <div key={i} style={{display:'flex',gap:'10px',marginBottom:'10px',alignItems:'flex-start'}}>
                  <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'rgba(255,255,255,0.85)',marginTop:'5px',flexShrink:0}}/>
                  <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.55}}>{s}</div>
                </div>
              ))}
            </div>
            <div className="mono-card">
              <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:'12px'}}>Weaknesses</div>
              {result.weaknesses.map((w,i)=>(
                <div key={i} style={{display:'flex',gap:'10px',marginBottom:'10px',alignItems:'flex-start'}}>
                  <div style={{width:'6px',height:'6px',borderRadius:'50%',background:'rgba(255,255,255,0.35)',marginTop:'5px',flexShrink:0}}/>
                  <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.55}}>{w}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="mono-card" style={{marginBottom:20}}>
            <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.5)',marginBottom:'6px'}}>Key Risk</div>
            <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.6}}>{result.key_risk}</div>
          </div>
          <div className="two-equal" style={{marginBottom:'24px'}}>
            <div className="mono-card">
              <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.4)',marginBottom:'8px'}}>Trim or Exit</div>
              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.6}}>{result.suggested_trim}</div>
            </div>
            <div className="mono-card">
              <div style={{fontSize:'10px',fontWeight:700,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(255,255,255,0.7)',marginBottom:'8px'}}>Would Add</div>
              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.6}}>{result.suggested_add}</div>
            </div>
          </div>
          <div className="slbl" style={{marginBottom:'14px'}}>Position-by-Position Verdict</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px'}}>
            {result.positions.map((p,i)=>{
              const live = result.live_snapshots?.[p.ticker];
              return (
                <div key={i} className="mono-card" style={{padding:'16px 18px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                    <div>
                      <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'16px',fontWeight:700,color:'#fff'}}>{p.ticker}</div>
                      {live?.price && <div style={{fontSize:'10px',color:'rgba(255,255,255,0.45)'}}>${live.price} {live.change_pct !== undefined && <span style={{color: live.change_pct>=0?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.4)'}}>{live.change_pct>=0?'+':''}{live.change_pct?.toFixed(2)}%</span>}</div>}
                    </div>
                    <div className={`mono-verdict ${verdictClass(p.verdict)}`}>{p.verdict}</div>
                  </div>
                  <div className="mono-bar" style={{marginBottom:'8px'}}>
                    <div className="mono-bar-fill" style={{width:p.conviction+'%',opacity:p.verdict==='BUY'?0.95:p.verdict==='SELL'?0.3:0.6}}></div>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                    <span style={{fontSize:'10px',color:'rgba(255,255,255,0.4)',letterSpacing:'0.1em',textTransform:'uppercase'}}>Conviction</span>
                    <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'14px',fontWeight:700,color:'#fff'}}>{p.conviction}</span>
                  </div>
                  <div style={{fontSize:'11px',color:'var(--dim)',lineHeight:1.5}}>{p.note}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── APP ── */
function App() {
  const [tab,setTab]=useState(0);
  const tabs=["Stress Test","Side-by-Side","Practice Mode","Quant Lab","Portfolio"];
  useScrollReveal();
  useEffect(()=>{ setTimeout(()=>{
    document.querySelectorAll('.reveal:not(.visible),.reveal-left:not(.visible),.reveal-right:not(.visible)').forEach(el=>{
      if(el.getBoundingClientRect().top<window.innerHeight*.9)el.classList.add('visible'); }); },80);
  },[tab]);
  const td = 1;
  return(
    <div style={{position:'relative',zIndex:1,background:'#080808'}}>
      <nav>
        <div className="nav-logo">Quant<span>Clone</span></div>
        <div className="nav-pill"><span className="live-dot"></span>Live Market Data · AI Investor Intelligence</div>
      </nav>
      <div className="hero">
        <div className="reveal-left visible">
          <div className="hero-eye">AI-Powered Investor Intelligence</div>
          <h1>See any stock through<br/>the eyes of the<br/><span style={{color:'rgba(255,255,255,0.35)'}}>greatest investors.</span></h1>
          <div className="hero-sub">QuantClone clones the decision-making frameworks of Buffett, Munger, Dalio, and Lynch — directly from their writing — and runs them against live market data.</div>
          <div className="hero-feats">
            {["Live fundamentals from real markets","Stress test any stock in seconds","Side-by-side investor comparison","Practice mode with scoring and feedback"].map((f,i)=>(
              <div className="hero-feat" key={i}><div className="feat-dot"></div><span>{f}</span></div>
            ))}
          </div>
        </div>
        <div className="reveal-right visible"><HeroSVG /></div>
      </div>
      <div className="section-divider"><div className="divider-line"></div></div>
      <div className="feat-strip">
        <FeatCard num="01" title="Stress Test" desc="Run any stock through one investor's full framework with live fundamentals and a structured verdict." delay={0.05} tiltDepth={td} />
        <FeatCard num="02" title="Side-by-Side" desc="Compare how two different investors would analyze the exact same stock simultaneously." delay={0.12} tiltDepth={td} />
        <FeatCard num="03" title="Practice Mode" desc="Make your own call first — then reveal what the masters decided and see your alignment score." delay={0.19} tiltDepth={td} />
        <FeatCard num="04" title="Clone Lab" desc="Explore the core principles and red flags that define each investor's decision-making style." delay={0.26} tiltDepth={td} />
      </div>
      <div className="section-divider"><div className="divider-line"></div></div>
      <div className="tabs-wrap">
        <div className="tab-bar reveal" data-delay="0.05">
          {tabs.map((t,i)=><button key={i} className={`tab-btn ${tab===i?'active':''}`} onClick={()=>setTab(i)}>{t}</button>)}
        </div>
        <div key={tab}>
          {tab===0&&<StressTest tiltDepth={td} />}
          {tab===1&&<SideBySide />}
          {tab===2&&<PracticeMode />}
          {tab===3&&<CloneLab tiltDepth={td} />}
          {tab===4&&<PortfolioMode />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
